name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config libcurl4-openssl-dev

      - name: Build library
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_NQE_LIBRARY=ON \
            -DBUILD_EXAMPLES=OFF
          cmake --build build --config Release -j $(nproc)

      - name: Package
        run: |
          mkdir -p nqe-linux-x64/lib nqe-linux-x64/include
          cp -r include/nqe nqe-linux-x64/include/
          cp build/libnqe.so nqe-linux-x64/lib/
          tar czf nqe-linux-x64.tar.gz nqe-linux-x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nqe-linux-x64
          path: nqe-linux-x64.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install cmake curl pkg-config

      - name: Build library
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_NQE_LIBRARY=ON \
            -DBUILD_EXAMPLES=OFF \
            -DCMAKE_PREFIX_PATH="$(brew --prefix curl)"
          cmake --build build --config Release -j $(sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p nqe-macos-universal/lib nqe-macos-universal/include
          cp -r include/nqe nqe-macos-universal/include/
          cp build/libnqe.dylib nqe-macos-universal/lib/
          tar czf nqe-macos-universal.tar.gz nqe-macos-universal

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nqe-macos-universal
          path: nqe-macos-universal.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install vcpkg packages
        shell: pwsh
        run: |
          vcpkg install curl[openssl]:x64-windows

      - name: Build library
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_NQE_LIBRARY=ON `
            -DBUILD_EXAMPLES=OFF `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path nqe-windows-x64/lib, nqe-windows-x64/include
          Copy-Item -Recurse include/nqe nqe-windows-x64/include/
          Copy-Item build/Release/nqe.dll nqe-windows-x64/lib/
          Copy-Item build/Release/nqe.lib nqe-windows-x64/lib/
          Compress-Archive -Path nqe-windows-x64 -DestinationPath nqe-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nqe-windows-x64
          path: nqe-windows-x64.zip

  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a, x86, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build library
        run: |
          cmake -S . -B build \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_NQE_LIBRARY=ON \
            -DBUILD_EXAMPLES=OFF
          cmake --build build --config Release -j $(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nqe-android-${{ matrix.abi }}
          path: build/libnqe.so

  package-android:
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all Android artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nqe-android-*
          path: android-artifacts

      - name: Package Android AAR-style
        run: |
          mkdir -p nqe-android/include
          cp -r include/nqe nqe-android/include/

          for abi in armeabi-v7a arm64-v8a x86 x86_64; do
            mkdir -p nqe-android/jniLibs/$abi
            cp android-artifacts/nqe-android-$abi/libnqe.so nqe-android/jniLibs/$abi/
          done

          tar czf nqe-android.tar.gz nqe-android

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nqe-android
          path: nqe-android.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, package-android]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/nqe-linux-x64/nqe-linux-x64.tar.gz
            artifacts/nqe-macos-universal/nqe-macos-universal.tar.gz
            artifacts/nqe-windows-x64/nqe-windows-x64.zip
            artifacts/nqe-android/nqe-android.tar.gz
